syntax = "proto3";

package fabrik.worker.v1;

message PollActivityTaskRequest {
  string tenant_id = 1;
  string task_queue = 2;
  string worker_id = 3;
  string worker_build_id = 4;
  uint64 poll_timeout_ms = 5;
  bool supports_cbor = 6;
}

message PollActivityTasksRequest {
  string tenant_id = 1;
  string task_queue = 2;
  string worker_id = 3;
  string worker_build_id = 4;
  uint64 poll_timeout_ms = 5;
  uint32 max_tasks = 6;
  bool supports_cbor = 7;
}

message ActivityTask {
  string tenant_id = 1;
  string definition_id = 2;
  uint32 definition_version = 3;
  string artifact_hash = 4;
  string instance_id = 5;
  string run_id = 6;
  string activity_id = 7;
  string activity_type = 8;
  string task_queue = 9;
  uint32 attempt = 10;
  string input_json = 11;
  string config_json = 12;
  bytes input_cbor = 22;
  bytes config_cbor = 23;
  bool prefer_cbor = 24;
  string state = 13;
  int64 scheduled_at_unix_ms = 14;
  int64 lease_expires_at_unix_ms = 15;
  uint64 start_to_close_timeout_ms = 16;
  uint64 heartbeat_timeout_ms = 17;
  bool cancellation_requested = 18;
  uint64 schedule_to_start_timeout_ms = 19;
  uint64 lease_epoch = 20;
  uint64 owner_epoch = 21;
  bool omit_success_output = 25;
  uint64 schedule_to_close_timeout_ms = 26;
  string activity_capabilities_json = 27;
  bytes activity_capabilities_cbor = 28;
}

message PollActivityTaskResponse {
  ActivityTask task = 1;
}

message PollActivityTasksResponse {
  repeated ActivityTask tasks = 1;
}

message PollBulkActivityTaskRequest {
  string tenant_id = 1;
  string task_queue = 2;
  string worker_id = 3;
  string worker_build_id = 4;
  uint64 poll_timeout_ms = 5;
  uint32 max_tasks = 6;
  bool supports_cbor = 7;
}

message BulkActivityTask {
  string tenant_id = 1;
  string definition_id = 2;
  uint32 definition_version = 3;
  string artifact_hash = 4;
  string instance_id = 5;
  string run_id = 6;
  string batch_id = 7;
  string chunk_id = 8;
  uint32 chunk_index = 9;
  uint32 group_id = 18;
  string activity_type = 10;
  string task_queue = 11;
  uint32 attempt = 12;
  string items_json = 13;
  string input_handle_json = 21;
  bytes items_cbor = 22;
  bytes input_handle_cbor = 23;
  bool prefer_cbor = 24;
  int64 scheduled_at_unix_ms = 14;
  int64 lease_expires_at_unix_ms = 15;
  bool cancellation_requested = 16;
  string lease_token = 17;
  uint64 lease_epoch = 19;
  uint64 owner_epoch = 20;
  bool omit_success_output = 25;
  uint32 item_count = 26;
  string activity_capabilities_json = 27;
  bytes activity_capabilities_cbor = 28;
}

message PollBulkActivityTaskResponse {
  repeated BulkActivityTask tasks = 1;
}

message PollWorkflowTaskRequest {
  int32 partition_id = 1;
  string worker_id = 2;
  string worker_build_id = 3;
  uint64 poll_timeout_ms = 4;
}

message WorkflowTask {
  string task_id = 1;
  string tenant_id = 2;
  string definition_id = 3;
  uint32 definition_version = 4;
  string artifact_hash = 5;
  string instance_id = 6;
  string run_id = 7;
  int32 partition_id = 8;
  string task_queue = 9;
  string preferred_build_id = 10;
  uint64 mailbox_consumed_seq = 11;
  uint64 resume_consumed_seq = 12;
  uint64 mailbox_backlog = 13;
  uint64 resume_backlog = 14;
  uint32 attempt_count = 15;
  int64 created_at_unix_ms = 16;
}

message PollWorkflowTaskResponse {
  WorkflowTask task = 1;
}

message CompleteWorkflowTaskRequest {
  string task_id = 1;
  string worker_id = 2;
  string worker_build_id = 3;
}

message FailWorkflowTaskRequest {
  string task_id = 1;
  string worker_id = 2;
  string worker_build_id = 3;
  string error = 4;
}

message CompleteActivityTaskRequest {
  string tenant_id = 1;
  string instance_id = 2;
  string run_id = 3;
  string activity_id = 4;
  uint32 attempt = 5;
  string worker_id = 6;
  string worker_build_id = 7;
  string output_json = 8;
  uint64 lease_epoch = 9;
  uint64 owner_epoch = 10;
}

message FailActivityTaskRequest {
  string tenant_id = 1;
  string instance_id = 2;
  string run_id = 3;
  string activity_id = 4;
  uint32 attempt = 5;
  string worker_id = 6;
  string worker_build_id = 7;
  string error = 8;
  uint64 lease_epoch = 9;
  uint64 owner_epoch = 10;
}

message RecordActivityHeartbeatRequest {
  string tenant_id = 1;
  string instance_id = 2;
  string run_id = 3;
  string activity_id = 4;
  uint32 attempt = 5;
  string worker_id = 6;
  string worker_build_id = 7;
  string details_json = 8;
  uint64 lease_epoch = 9;
  uint64 owner_epoch = 10;
}

message RecordActivityHeartbeatResponse {
  bool cancellation_requested = 1;
}

message ReportActivityTaskCancelledRequest {
  string tenant_id = 1;
  string instance_id = 2;
  string run_id = 3;
  string activity_id = 4;
  uint32 attempt = 5;
  string worker_id = 6;
  string worker_build_id = 7;
  string reason = 8;
  string metadata_json = 9;
  uint64 lease_epoch = 10;
  uint64 owner_epoch = 11;
}

message ActivityTaskCompletedResult {
  string output_json = 1;
  bytes output_cbor = 2;
}

message ActivityTaskFailedResult {
  string error = 1;
}

message ActivityTaskCancelledResult {
  string reason = 1;
  string metadata_json = 2;
  bytes metadata_cbor = 3;
}

message ActivityTaskResult {
  string tenant_id = 1;
  string instance_id = 2;
  string run_id = 3;
  string activity_id = 4;
  uint32 attempt = 5;
  string worker_id = 6;
  string worker_build_id = 7;
  uint64 lease_epoch = 11;
  uint64 owner_epoch = 12;

  oneof result {
    ActivityTaskCompletedResult completed = 8;
    ActivityTaskFailedResult failed = 9;
    ActivityTaskCancelledResult cancelled = 10;
  }
}

message ReportActivityTaskResultsRequest {
  repeated ActivityTaskResult results = 1;
}

message BulkActivityTaskCompletedResult {
  string output_json = 1;
  string result_handle_json = 2;
  bytes output_cbor = 3;
  bytes result_handle_cbor = 4;
}

message BulkActivityTaskFailedResult {
  string error = 1;
}

message BulkActivityTaskCancelledResult {
  string reason = 1;
  string metadata_json = 2;
  bytes metadata_cbor = 3;
}

message BulkActivityTaskResult {
  string tenant_id = 1;
  string instance_id = 2;
  string run_id = 3;
  string batch_id = 4;
  string chunk_id = 5;
  uint32 chunk_index = 6;
  uint32 group_id = 14;
  uint32 attempt = 7;
  string worker_id = 8;
  string worker_build_id = 9;
  string lease_token = 13;
  uint64 lease_epoch = 15;
  uint64 owner_epoch = 16;
  string report_id = 17;

  oneof result {
    BulkActivityTaskCompletedResult completed = 10;
    BulkActivityTaskFailedResult failed = 11;
    BulkActivityTaskCancelledResult cancelled = 12;
  }
}

message ReportBulkActivityTaskResultsRequest {
  repeated BulkActivityTaskResult results = 1;
}

message Ack {}

service ActivityWorkerApi {
  rpc PollActivityTask(PollActivityTaskRequest) returns (PollActivityTaskResponse);
  rpc PollActivityTasks(PollActivityTasksRequest) returns (PollActivityTasksResponse);
  rpc PollBulkActivityTask(PollBulkActivityTaskRequest) returns (PollBulkActivityTaskResponse);
  rpc CompleteActivityTask(CompleteActivityTaskRequest) returns (Ack);
  rpc FailActivityTask(FailActivityTaskRequest) returns (Ack);
  rpc RecordActivityHeartbeat(RecordActivityHeartbeatRequest) returns (RecordActivityHeartbeatResponse);
  rpc ReportActivityTaskCancelled(ReportActivityTaskCancelledRequest) returns (Ack);
  rpc ReportActivityTaskResults(ReportActivityTaskResultsRequest) returns (Ack);
  rpc ReportBulkActivityTaskResults(ReportBulkActivityTaskResultsRequest) returns (Ack);
}

service WorkflowWorkerApi {
  rpc PollWorkflowTask(PollWorkflowTaskRequest) returns (PollWorkflowTaskResponse);
  rpc CompleteWorkflowTask(CompleteWorkflowTaskRequest) returns (Ack);
  rpc FailWorkflowTask(FailWorkflowTaskRequest) returns (Ack);
}
